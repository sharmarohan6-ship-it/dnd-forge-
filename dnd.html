<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="D&D Forge">
    <link rel="apple-touch-icon" href="icon512.png">

    <title>Fiery D&D Creation Forge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
/* GLOBAL BACKGROUND */
body {
    margin: 0;
    font-family: "Georgia", serif;
    background: radial-gradient(circle at top, #000000 0%, #2a0000 40%, #660000 80%);
    background-size: 200%;
    animation: bgShift 18s ease-in-out infinite, fadeIn 1.5s ease;
    color: #fff2e0;
}

/* BACKGROUND ANIMATION */
@keyframes bgShift {
    0% { background-position: 50% 0%; }
    50% { background-position: 50% 100%; }
    100% { background-position: 50% 0%; }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* HEADER */
@keyframes emberPulse {
    0%, 100% { text-shadow: 0 0 10px #ff2e2e, 0 0 20px #b30000; }
    50% { text-shadow: 0 0 14px #ff5e5e, 0 0 28px #ff2e2e; }
}

header {
    background: linear-gradient(180deg, #000000 0%, #2a0000 100%);
    padding: 16px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    color: #ffffff; /* bright white text */
    letter-spacing: 1.5px;
    border-bottom: 3px solid #ff0000;
    animation: emberPulse 3s infinite ease-in-out;
}
<div class="nav-toggle">☰ Menu</div>
<div class="nav-bar">
    <!-- your existing nav buttons -->
</div>
/* NAV BAR */
.nav-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 95%;
    z-index: 1000;
    background: #000000;
    border-bottom: 2px solid #ff0000;
    padding: 10px;
    display: flex;
    justify-content: center;
    gap: 12px;
    box-shadow: 0 0 10px #330000;
    transition: top 0.4s ease-in-out; /* smooth hide/reveal */
}

/* BUTTONS */
button {
    background: linear-gradient(135deg, #660000, #330000);
    color: #fff2e0;
    border: 2px solid #ff0000;
    border-radius: 6px;
    padding: 10px 16px;
    font-weight: bold;
    letter-spacing: 0.5px;
    transition: 0.2s ease;
    box-shadow: 0 0 8px #330000;
}

button:hover {
    background: linear-gradient(135deg, #990000, #440000);
    box-shadow: 0 0 12px #ff0000;
    transform: scale(1.05);
}

/* PANELS */
.panel {
    background: #121212;
    border: 2px solid #660000;
    border-radius: 10px;
    box-shadow: 0 0 10px #330000;
    padding: 16px;
    margin-bottom: 16px;
}

/* INPUTS */
input, select, textarea {
    background: #0d0d0d;
    border: 2px solid #660000;
    color: #ffcccc;
    border-radius: 6px;
    padding: 8px;
    box-shadow: inset 0 0 6px #330000;
    transition: 0.2s ease;
}

input:focus, select:focus, textarea:focus {
    border-color: #ff2e2e;
    box-shadow: 0 0 8px #ff0000;
}

/* TEXT */
h2, h3, label {
    color: #ffffff;
    text-shadow: 0 0 6px #ff2e2e;
}

p, span {
    color: #b0b0b0;
}

/* OUTPUT BOX */
.output-box {
    background: #0d0000;
    border: 2px solid #ff0000;
    color: #fff2e0;
    padding: 16px;
    border-radius: 10px;
    box-shadow: 0 0 12px #330000;
    white-space: pre-wrap;
}
/* RESPONSIVE DESIGN FOR MOBILE */
@media (max-width: 768px) {
    body {
        padding: 10px;
    }

    header {
        font-size: 22px;
        padding: 12px;
    }

    .nav-bar {
        flex-wrap: wrap;
        gap: 8px;
    }

    .panel {
        padding: 12px;
        margin-bottom: 12px;
    }

    input, select, textarea, button {
        width: 100%;
        box-sizing: border-box;
        font-size: 14px;
    }

    h2, h3, label {
        font-size: 16px;
    }

    .output-box {
        font-size: 14px;
        padding: 12px;
    }
}
    </style>
</head>

<body>
<header>Fiery D&D Creation Forge</header>

<!-- FIXED FIERY NAV BAR -->
<div class="nav-bar">
    <button class="nav-btn active" data-page="classPage">
        <span class="icon">🛡</span><span>Class Builder</span>
    </button>
    <button class="nav-btn" data-page="racePage">
        <span class="icon">🧬</span><span>Race Builder</span>
    </button>
    <button class="nav-btn" data-page="spellPage">
        <span class="icon">✨</span><span>Spell Builder</span>
    </button>

        <span class="icon">🐲</span><span>Entity creator</span>

<!-- CLASS PAGE -->
<div id="classPage" class="page">
    <div class="container">
        <div class="panel">
            <h2>🛡 Class Builder</h2>

            <label>Class Name</label>
            <input id="cls_name">

            <label>Role</label>
            <select id="cls_role" onchange="classRoleChanged()">
                <option value="">Select role</option>
                <option>Warrior</option>
                <option>Mage</option>
                <option>Rogue</option>
                <option>Cleric</option>
                <option>Druid</option>
                <option>Paladin</option>
                <option>Ranger</option>
                <option>Barbarian</option>
                <option>Sorcerer</option>
                <option>Assassin</option>
                <option>Tank</option>
                <option>Support</option>
                <option>Healer</option>
                <option>Striker</option>
                <option>Controller</option>
                <option>Caster</option>
                <option>Martial</option>
                <option>Summoner</option>
                <option value="custom">Custom</option>
            </select>

            <input id="cls_role_custom" class="hidden" placeholder="Custom role">

            <label>Hit Die</label>

                <option>d6</option>
                <option>d8</option>
                <option>d10</option>
                <option>d12</option>
            </select>

            <label>Primary Abilities</label>

            <label>Proficiencies (comma separated)</label>
            <textarea id="cls_profs"></textarea>

            <h3>Features by Level</h3>
            <div class="two-col">
                <div>
                    <label>Level</label>
                    <input id="cls_feat_level" type="number" min="1" max="20">
                </div>
                <div>
                    <label>Feature Name</label>
                    <input id="cls_feat_name">
                </div>
            </div>
            <button onclick="addClassFeature()">Add Feature</button>

            <h3>Subclass</h3>
            <label>Subclass Name</label>
            <input id="cls_sub_name">
            <label>Subclass Features (one per line, format: level: feature)</label>
            <textarea id="cls_sub_feats"></textarea>
            <button onclick="addSubclass()">Add Subclass</button>

            <button onclick="generateClass()">Generate Class</button>
            <button onclick="saveClass()">Save Class</button>
            <button onclick="loadClass()">Load Class</button>
            <button onclick="window.print()">Print</button>
        </div>

        <div class="panel">
            <h2>Class Preview</h2>
            <div id="classOutput" class="output-box"></div>
        </div>
    </div>
</div>

<!-- RACE PAGE -->
<div id="racePage" class="page hidden">
    <div class="container">
        <div class="panel">
            <h2>🧬 Race Builder</h2>

            <label>Race Name</label>
            <input id="race_name">

            <label>Ability Score Bonuses</label>
            <input id="race_as">

            <label>Size</label>
            <select id="race_size">
                <option>Small</option>
                <option>Medium</option>
                <option>Large</option>
            </select>

            <label>Speed (ft.)</label>
            <input id="race_speed" type="number" value="30">

            <label>Languages</label>
            <input id="race_lang">

            <h3>Racial Traits</h3>
            <textarea id="race_traits" placeholder="One trait per line"></textarea>

            <h3>Subrace (optional)</h3>
            <label>Subrace Name</label>
            <input id="race_sub_name">
            <label>Subrace Traits</label>
            <textarea id="race_sub_traits" placeholder="One trait per line"></textarea>

            <button onclick="generateRace()">Generate Race</button>
            <button onclick="saveRace()">Save Race</button>
            <button onclick="loadRace()">Load Race</button>
        </div>

        <div class="panel">
            <h2>Race Preview</h2>
            <div id="raceOutput" class="output-box"></div>
        </div>
    </div>
</div>

<!-- SAVED CREATIONS PAGE -->
<div id="savedPage" class="page hidden">
    <div class="container">
        <div class="panel">
            <h2>📦 Saved Classes</h2>
            <div id="savedClasses" class="saved-list"></div>
        </div>
        <div class="panel">
            <h2>📦 Saved Races</h2>
            <div id="savedRaces" class="saved-list"></div>
        </div>
        <div class="panel">
            <h2>📦 Saved Spells</h2>
            <div id="savedSpells" class="saved-list"></div>
        </div>
        <div class="panel">
            <h2>📦 Saved Monsters</h2>
            <div id="savedMonsters" class="saved-list"></div>
        </div>
    </div>

<script>
    /* NAVIGATION */
    const pages = ["classPage", "racePage", "spellPage", "monsterPage", "savedPage"];

    document.querySelectorAll(".nav-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            const target = btn.getAttribute("data-page");
            pages.forEach(id => {
                document.getElementById(id).classList.toggle("hidden", id !== target);
            });
            document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            if (target === "savedPage") refreshSavedLists();
        });
    });

    /* CLASS BUILDER */
    let classFeatures = {};
    let classSubclasses = {};

    function classRoleChanged() {
        const roleSel = document.getElementById("cls_role");
        const custom = document.getElementById("cls_role_custom");
        if (roleSel.value === "custom") custom.classList.remove("hidden");
        else custom.classList.add("hidden");
    }

    function addClassFeature() {
        const lvl = document.getElementById("cls_feat_level").value;
        const name = document.getElementById("cls_feat_name").value.trim();
        if (!lvl || !name) return alert("Enter level and feature name.");
        if (!classFeatures[lvl]) classFeatures[lvl] = [];
        classFeatures[lvl].push(name);
        document.getElementById("cls_feat_name").value = "";
        alert("Feature added.");
    }

    function addSubclass() {
        const name = document.getElementById("cls_sub_name").value.trim();
        const raw = document.getElementById("cls_sub_feats").value.split("\n");
        if (!name) return alert("Enter subclass name.");
        let parsed = {};
        raw.forEach(line => {
            const parts = line.split(":");
            if (parts.length === 2) {
                const lvl = parts[0].trim();
                const feat = parts[1].trim();
                if (!parsed[lvl]) parsed[lvl] = [];
                parsed[lvl].push(feat);
            }
        });
        classSubclasses[name] = parsed;
        alert("Subclass added.");
    }

    function generateClass() {
        const name = document.getElementById("cls_name").value || "Unnamed Class";
        const roleSel = document.getElementById("cls_role").value;
        const customRole = document.getElementById("cls_role_custom").value;
        const role = roleSel === "custom" ? (customRole || "Custom") : (roleSel || "Unknown");
        const hitdie = document.getElementById("cls_hitdie").value;
        const abilities = document.getElementById("cls_abilities").value;
        const profs = document.getElementById("cls_profs").value;

        let text = `=== ${name} ===\n`;
        text += `Role: ${role}\n`;
        text += `Hit Die: ${hitdie}\n`;
        text += `Primary Abilities: ${abilities}\n\n`;

        text += `--- Proficiencies ---\n`;
        profs.split(",").forEach(p => {
            if (p.trim()) text += `• ${p.trim()}\n`;
        });

        text += `\n--- Features by Level ---\n`;
        const levels = Object.keys(classFeatures).sort((a,b)=>Number(a)-Number(b));
        levels.forEach(lvl => {
            text += `Level ${lvl}: ${classFeatures[lvl].join(", ")}\n`;
        });

        text += `\n--- Subclasses ---\n`;
        Object.keys(classSubclasses).forEach(sub => {
            text += `\n${sub}:\n`;
            const subLevels = Object.keys(classSubclasses[sub]).sort((a,b)=>Number(a)-Number(b));
            subLevels.forEach(lvl => {
                text += `  Level ${lvl}: ${classSubclasses[sub][lvl].join(", ")}\n`;
            });
        });

        document.getElementById("classOutput").textContent = text;
    }

    function saveClass() {
        const data = {
            name: document.getElementById("cls_name").value,
            role: document.getElementById("cls_role").value,
            customRole: document.getElementById("cls_role_custom").value,
            hitdie: document.getElementById("cls_hitdie").value,
            abilities: document.getElementById("cls_abilities").value,
            profs: document.getElementById("cls_profs").value,
            features: classFeatures,
            subclasses: classSubclasses
        };
        let list = JSON.parse(localStorage.getItem("classes") || "[]");
        list.push(data);
        localStorage.setItem("classes", JSON.stringify(list));
        alert("Class saved.");
    }

    function loadClass() {
        const list = JSON.parse(localStorage.getItem("classes") || "[]");
        if (!list.length) return alert("No saved classes.");
        const data = list[list.length - 1];
        document.getElementById("cls_name").value = data.name || "";
        document.getElementById("cls_role").value = data.role || "";
        document.getElementById("cls_role_custom").value = data.customRole || "";
        document.getElementById("cls_hitdie").value = data.hitdie || "d8";
        document.getElementById("cls_abilities").value = data.abilities || "";
        document.getElementById("cls_profs").value = data.profs || "";
        classFeatures = data.features || {};
        classSubclasses = data.subclasses || {};
        classRoleChanged();
        generateClass();
        alert("Last saved class loaded.");
    }

    /* RACE BUILDER */
    function generateRace() {
        const name = document.getElementById("race_name").value || "Unnamed Race";
        const as = document.getElementById("race_as").value;
        const size = document.getElementById("race_size").value;
        const speed = document.getElementById("race_speed").value;
        const lang = document.getElementById("race_lang").value;
        const traits = document.getElementById("race_traits").value.split("\n");
        const subName = document.getElementById("race_sub_name").value.trim();
        const subTraits = document.getElementById("race_sub_traits").value.split("\n");

        let out = `=== ${name} ===\n`;
        out += `Ability Score Bonuses: ${as}\n`;
        out += `Size: ${size}\n`;
        out += `Speed: ${speed} ft.\n`;
        out += `Languages: ${lang}\n\n`;

        out += `--- Racial Traits ---\n`;
        traits.forEach(t => { if (t.trim()) out += `• ${t.trim()}\n`; });

        if (subName) {
            out += `\n--- Subrace: ${subName} ---\n`;
            subTraits.forEach(t => { if (t.trim()) out += `• ${t.trim()}\n`; });
        }

        document.getElementById("raceOutput").textContent = out;
    }

    function saveRace() {
        const data = {
            name: document.getElementById("race_name").value,
            as: document.getElementById("race_as").value,
            size: document.getElementById("race_size").value,
            speed: document.getElementById("race_speed").value,
            lang: document.getElementById("race_lang").value,
            traits: document.getElementById("race_traits").value,
            subName: document.getElementById("race_sub_name").value,
            subTraits: document.getElementById("race_sub_traits").value
        };
        let list = JSON.parse(localStorage.getItem("races") || "[]");
        list.push(data);
        localStorage.setItem("races", JSON.stringify(list));
        alert("Race saved.");
    }

    function loadRace() {
        const list = JSON.parse(localStorage.getItem("races") || "[]");
        if (!list.length) return alert("No saved races.");
        const data = list[list.length - 1];
        document.getElementById("race_name").value = data.name || "";
        document.getElementById("race_as").value = data.as || "";
        document.getElementById("race_size").value = data.size || "Medium";
        document.getElementById("race_speed").value = data.speed || 30;
        document.getElementById("race_lang").value = data.lang || "";
        document.getElementById("race_traits").value = data.traits || "";
        document.getElementById("race_sub_name").value = data.subName || "";
        document.getElementById("race_sub_traits").value = data.subTraits || "";
        generateRace();
        alert("Last saved race loaded.");
    }

    /* SPELL BUILDER */
    function generateSpell() {
        const name = document.getElementById("spell_name").value || "Unnamed Spell";
        const level = document.getElementById("spell_level").value;
        const school = document.getElementById("spell_school").value;
        const cast = document.getElementById("spell_cast_time").value;
        const range = document.getElementById("spell_range").value;
        const duration = document.getElementById("spell_duration").value;
        const comps = document.getElementById("spell_components").value;

    function generateMonster() {

        const align = document.getElementById("mon_align").value;

        const traits = document.getElementById("mon_traits").value.split("\n");
        const actions = document.getElementById("mon_actions").value.split("\n");
        const legendary = document.getElementById("mon_legendary").value.split("\n");

        let out = `=== ${name} ===\n`;
        out += `${size} ${type}, ${align}\n\n`;
        out += `Armor Class: ${ac}\n`;
        out += `Hit Points: ${hp}\n`;
        out += `Speed: ${speed}\n\n`;

        out += `STR ${str}   DEX ${dex}   CON ${con}\n`;
        out += `INT ${intv}   WIS ${wis}   CHA ${cha}\n\n`;

        if (saves.trim()) out += `Saving Throws: ${saves}\n`;
        if (skills.trim()) out += `Skills: ${skills}\n`;
        if (resist.trim()) out += `Damage Resistances: ${resist}\n`;
        if (immune.trim()) out += `Damage Immunities: ${immune}\n`;
        if (condImmune.trim()) out += `Condition Immunities: ${condImmune}\n`;
        if (senses.trim()) out += `Senses: ${senses}\n`;
        if (lang.trim()) out += `Languages: ${lang}\n`;
        if (cr.trim()) out += `Challenge: ${cr}\n`;

        out += `\n--- Traits ---\n`;
        traits.forEach(t => { if (t.trim()) out += `• ${t.trim()}\n`; });

        out += `\n--- Actions ---\n`;
        actions.forEach(a => { if (a.trim()) out += `• ${a.trim()}\n`; });

        if (legendary.some(l => l.trim())) {
            out += `\n--- Legendary Actions ---\n`;
            legendary.forEach(l => { if (l.trim()) out += `• ${l.trim()}\n`; });
        }

        document.getElementById("monsterOutput").textContent = out;
    }

    });
});

<script>
let lastScrollTop = 0;
const navBar = document.querySelector('.nav-bar');
let scrollTimeout;

window.addEventListener('scroll', () => {
    const currentScroll = window.pageYOffset || document.documentElement.scrollTop;

    // Clear previous timeout
    clearTimeout(scrollTimeout);

    if (currentScroll > lastScrollTop + 15) {
        // Scrolling down → hide nav bar
        navBar.style.top = '-300px';
    } else if (currentScroll < lastScrollTop - 15) {
        // Scrolling up → show nav bar
        navBar.style.top = '0';
    }

    // Add a slight delay before updating lastScrollTop
    scrollTimeout = setTimeout(() => {
        lastScrollTop = currentScroll <= 0 ? 0 : currentScroll;
    }, 10000);
});
</script>
